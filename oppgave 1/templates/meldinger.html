{% extends "base.html" %}
{% block content %}
<h1>Meldinger</h1>
<form method="post">
    <input name="tekst" placeholder="Skriv en melding" required>
    <button type="submit">Lagre</button>
</form>
<ul>
    {% for m in meldinger %}
        <li><b>{{ m.bruker }}:</b> {{ m.tekst }}</li>
    {% endfor %}
</ul>
{% endblock %}
